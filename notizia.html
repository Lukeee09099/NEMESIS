
         <!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NEMESIS | Notizia</title>

<meta name="description" content="Notizie e analisi indipendenti su storia, scienza e geopolitica.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
NEMESIS ARTICLE STYLE
========================= */

:root{

--yellow:#FFD166;
--orange:#F07C3E;
--green:#06D6A0;
--blue:#118AB2;
--deep:#073B4C;

--cream:#FDF9F3;
--light:#F0F3F5;
--mid:#D9E2E6;
--dark:#4A5568;

--text:#1E2F4D;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;
background:var(--cream);
color:var(--text);
line-height:1.7;

}

/* HEADER */

header{

background:linear-gradient(135deg,var(--deep),var(--blue));
padding:1rem;

position:sticky;
top:0;

z-index:1000;

}

.logo{

font-size:2rem;
font-weight:800;

color:var(--yellow);
text-decoration:none;

}

.logo span{

color:var(--orange);

}

/* CONTAINER */

.container{

max-width:900px;
margin:auto;

padding:2rem;

}

/* HERO IMAGE */

.hero-image{

width:100%;
height:420px;

border-radius:25px;

object-fit:cover;

margin-bottom:2rem;

box-shadow:0 20px 50px rgba(0,0,0,0.15);

}

/* ARTICLE */

.article{

background:white;

padding:3rem;

border-radius:30px;

box-shadow:0 20px 40px rgba(0,0,0,0.05);

border:1px solid var(--mid);

}

/* TITLE */

.article-title{

font-size:2.7rem;
margin-bottom:1rem;

color:var(--deep);

}

/* META */

.article-meta{

color:var(--dark);

margin-bottom:2rem;

font-style:italic;

}

/* CONTENT */

.article-content p{

margin-bottom:1.4rem;

font-size:1.1rem;

}

/* BACK BUTTON */

.back-btn{

display:inline-block;

margin-top:2rem;

padding:.9rem 2rem;

background:var(--blue);

color:white;

border-radius:50px;

text-decoration:none;

font-weight:600;

transition:.3s;

}

.back-btn:hover{

background:var(--deep);

}

/* FOOTER */

footer{

margin-top:4rem;

background:var(--deep);

color:white;

text-align:center;

padding:2rem;

}

footer a{

color:var(--yellow);

}

/* FADE ANIMATION */

.fade{

animation:fade 1s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.article{

padding:2rem;

}

.article-title{

font-size:2rem;

}

.hero-image{

height:260px;

}

}

</style>

</head>


<body>

<header>

<a href="index.html" class="logo">NEMESIS<span>⚡</span></a>

</header>


<main class="container fade">

<img id="newsImage" class="hero-image" src="">

<article class="article">

<h1 id="newsTitle" class="article-title">Caricamento...</h1>

<div id="newsDate" class="article-meta"></div>

<div id="newsContent" class="article-content"></div>

<a href="index.html" class="back-btn">← Torna alla home</a>

</article>

</main>


<footer>

<p>© 2025 NEMESIS — Cogito Ergo Revolvo</p>

<p>
Powered by
<a href="https://deepseek.com" target="_blank">DeepSeek AI</a> ⚡
</p>

</footer>


<script>

/* ======================
URL PARAM
====================== */

function getQueryParam(param){

const urlParams=new URLSearchParams(window.location.search);

return urlParams.get(param);

}

const title=getQueryParam('title') || "Notizia senza titolo";

/* ======================
DATE RANDOM
====================== */

const date=new Date();

date.setHours(date.getHours()-Math.floor(Math.random()*48));

const formattedDate=date.toLocaleDateString('it-IT',{

day:'2-digit',
month:'long',
year:'numeric',
hour:'2-digit',
minute:'2-digit'

});

/* ======================
IMAGE SELECTION
====================== */

let imageUrl="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3";

const t=title.toLowerCase();

if(t.includes("archeologia")||t.includes("civiltà")||t.includes("göbekli")){

imageUrl="https://images.pexels.com/photos/160846/gobekli-tepe-archaeological-site-excavation-ancient-160846.jpeg";

}

else if(t.includes("guerra")||t.includes("conflitto")){

imageUrl="https://images.pexels.com/photos/6994590/pexels-photo-6994590.jpeg";

}

else if(t.includes("spazio")||t.includes("nasa")){

imageUrl="https://images.pexels.com/photos/2150/sky-space-dark-galaxy.jpg";

}

else if(t.includes("cervello")||t.includes("mente")){

imageUrl="https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg";

}

/* ======================
CONTENT GENERATION
====================== */

const content=`

<p>Questa notizia è stata selezionata perché rientra nei pattern di analisi che stiamo studiando su NEMESIS.</p>

<p><strong>Titolo originale:</strong> ${title}</p>

<p>Secondo la nostra analisi, eventi simili si sono verificati più volte nella storia. Quando determinati segnali emergono contemporaneamente in ambiti diversi — scientifici, geopolitici o culturali — spesso indicano cambiamenti più profondi.</p>

<p>Il nostro obiettivo è osservare questi fenomeni con uno sguardo critico, confrontando i dati moderni con le dinamiche del passato.</p>

<p>Nei prossimi articoli approfondiremo ulteriormente questa tematica, cercando di individuare correlazioni e possibili implicazioni future.</p>

`;

/* ======================
DOM INSERT
====================== */

document.getElementById("newsTitle").textContent=title;

document.getElementById("newsDate").textContent="Pubblicato il "+formattedDate;

document.getElementById("newsImage").src=imageUrl;

document.getElementById("newsContent").innerHTML=content;

</script>


</body>

</html>
